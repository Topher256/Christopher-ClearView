<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — Christopher Clear View</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-left">
    <div>
      <div class="auth-logo"><i class="fa-solid fa-video-camera"></i> Vision<span style="color:var(--orange)">Sum</span></div>
      <div class="auth-tagline">We'll send a reset link<br>to your registered email.</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Enter your email to receive a reset link.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
        </div>
        <button type="submit" class="btn-orange" style="width:100%;justify-content:center;padding:.75rem;">
          <i class="fa-solid fa-envelope"></i> Send Reset Link
        </button>
      </form>
      <p style="text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--text-muted);">
        Remember it? <a href="{{ url_for('login') }}" class="auth-link">Back to Login</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
